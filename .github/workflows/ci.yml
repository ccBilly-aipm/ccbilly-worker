name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (lint · types · unit · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        # Skip all postinstall build scripts (pnpm 11 otherwise fails with
        # ERR_PNPM_IGNORED_BUILDS in CI). esbuild/sharp/unrs-resolver ship
        # prebuilt binaries and don't need their postinstall for our tasks.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native module (better-sqlite3)
        # Runs better-sqlite3's own install (prebuild-install → prebuilt binary).
        run: node scripts/build-native.mjs

      - name: Verify (lint + typecheck + unit tests + build)
        run: pnpm verify

  e2e:
    name: e2e (Playwright · chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (includes S1 security adversarial suite)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
