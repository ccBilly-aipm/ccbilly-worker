name: 功能建议
description: 提出一个新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        这是一个本地优先的单用户个人工作台——建议尽量贴合这一定位（Markdown-first、local-first、单人）。
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 你遇到的实际场景 / 痛点，而不是直接给方案。
      placeholder: 每次我想 … 都很麻烦，因为 …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案
      description: 你期望它怎么工作。
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / 现在怎么绕过
    validations:
      required: false
